<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body { margin:0; }
        div#main { position: absolute; width:100%; height:100%; }
        #main div { position: relative; width:25%; height:38%; border:solid 5px #000; float:left; text-align: center; margin:50px; }
        #main div:nth-child(1) { background-color:red; color:green; border:solid 5px yellow; }
        #main div:nth-child(2) { background-color:green; color:red; border:dashed 5px blue; }
        #main div:nth-child(3) { background-color:slateblue; color:white; border:dotted 5px greenyellow; }
        #main div:nth-child(4) { background-color:steelblue; color:saddlebrown; border:outset 5px purple; }
        #main div:nth-child(5) { background-color:tomato; color:violet; border:inset 5px rebeccapurple; }
        #main div:nth-child(6) { background-color:seagreen; color:skyblue; border:ridge 5px navy; }
    </style>
</head>
<body>
    <div id="main">
        <div>Div 1</div>
        <div>Div 2</div>
        <div>Div 3</div>
        <div>Div 4</div>
        <div>Div 5</div>
        <div>Div 6</div>
    </div>
</body>
</html>
