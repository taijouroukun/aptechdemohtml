<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table { position: absolute;}
        body { margin:0px;}
        td.cell1 { background-color:red; color:green; border:solid 5px yellow; }
        td.cell2 { background-color:green; color:red; border:dashed 5px blue; }
        td.cell3 { background-color:slateblue; color:white; border:dotted 5px greenyellow; }
        td.cell4 { background-color:steelblue; color:saddlebrown; border:outset 5px purple; }
        td.cell5 { background-color:tomato; color:violet; border:inset 5px rebeccapurple; }
        td.cell6 { background-color:seagreen; color:skyblue; border:ridge 5px navy; }
    </style>
</head>
<body>
    <table border="1" width="100%" height="100%" cellspacing="30">
        <tr>
            <td class="cell1" align="center" valign="top">Div 1</td>
            <td class="cell2" align="center" valign="top">Div 2</td>
            <td class="cell3" align="center" valign="top">Div 3</td>
        </tr>
        <tr>
            <td class="cell4" align="center" valign="top">Div 4</td>
            <td class="cell5" align="center" valign="top">Div 5</td>
            <td class="cell6" align="center" valign="top">Div 6</td>
        </tr>
    </table>
</body>
</html>
